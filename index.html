<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Remember When</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Open+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Capture Google OAuth tokens before any app code runs (hash is lost if we wait). -->
    <script>
      (function () {
        var hash = window.location.hash.replace(/^#/, "");
        if (!hash) return;
        var params = new URLSearchParams(hash);
        var error = params.get("error");
        if (error) {
          var description = params.get("error_description");
          sessionStorage.setItem(
            "remember-when.oauth-error",
            description ? description.replace(/\+/g, " ") : error.replace(/_/g, " ")
          );
          history.replaceState(null, "", window.location.pathname);
          return;
        }
        var accessToken = params.get("access_token");
        if (!accessToken) return;
        sessionStorage.setItem("remember-when.auth-token", accessToken);
        sessionStorage.setItem("remember-when.oauth-return", "1");
        var secure = window.location.protocol === "https:" ? "; Secure" : "";
        document.cookie =
          "nf_jwt=" + encodeURIComponent(accessToken) + "; Path=/; SameSite=Lax" + secure;
        var refresh = params.get("refresh_token");
        if (refresh) {
          document.cookie =
            "nf_refresh=" + encodeURIComponent(refresh) + "; Path=/; SameSite=Lax" + secure;
        }
        history.replaceState(null, "", window.location.pathname);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
